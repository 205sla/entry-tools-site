<style>
  :root {
    /* core palette - will be overridden by theme */
    --bg: #f7faf7;
    --bg-2: #ecf3ec;
    --ink: #0f1a12;
    --ink-2: #3b4a3f;
    --ink-3: #6a7a6d;
    --line: #d6e0d6;
    --line-2: #e6ecea;
    --surface: #ffffff;
    --brand: #1fb25a;
    --brand-ink: #0b6b35;
    --brand-soft: #d8f0e0;
    --brand-tint: #eaf7ee;
    --accent: #e89b3c;
    --warn: #d64545;

    --radius-s: 8px;
    --radius-m: 14px;
    --radius-l: 22px;

    --shadow-s: 0 1px 0 rgba(15,26,18,.04), 0 1px 2px rgba(15,26,18,.06);
    --shadow-m: 0 1px 0 rgba(15,26,18,.04), 0 8px 24px -8px rgba(15,26,18,.12);

    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", sans-serif;
    --display: "Space Grotesk", var(--sans);
  }

  [data-theme="dark"] {
    --bg: #0c1310;
    --bg-2: #121b16;
    --ink: #eaf3ec;
    --ink-2: #b6c4ba;
    --ink-3: #7f8f84;
    --line: #223029;
    --line-2: #1a241e;
    --surface: #141d18;
    --brand: #3be078;
    --brand-ink: #a9f0c2;
    --brand-soft: #183d27;
    --brand-tint: #112019;
    --accent: #f0b365;
  }

  [data-theme="studio"] {
    /* warmer, paper-like */
    --bg: #f6f2e9;
    --bg-2: #ece5d4;
    --ink: #1a1a17;
    --ink-2: #3a3a33;
    --ink-3: #6b6a5f;
    --line: #ddd4be;
    --line-2: #e8e0ca;
    --surface: #fffdf5;
    --brand: #2f8f4b;
    --brand-ink: #1e5a30;
    --brand-soft: #d9e9cf;
    --brand-tint: #ebf1df;
    --accent: #c8532d;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv01";
    line-height: 1.55;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* selection */
  ::selection { background: var(--brand); color: white; }

  /* shared */
  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 28px; }
  .mono { font-family: var(--mono); font-feature-settings: "zero", "ss01"; }
  .kbd {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 6px;
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 5px;
    background: var(--surface);
    color: var(--ink-2);
  }

  /* scrollbar reset */
  html { scroll-behavior: smooth; }
</style>
</head>
